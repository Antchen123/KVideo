名称: 与上游同步

启用:
计划:
    - cron: '0 0 * * 3,0'→ 每周三和周日零点运行  
 工作流调度:      # 允许手动触发

作业:
同步:
运行于: ubuntu-latest
步骤:
      - name: Checkout代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整提交历史
          
      - name: 配置git
        run: |
          git config --global user.name "Antchen123"
          git config --global user.email "antchen123456@outlook.com"
          
添加上游仓库
: git remote add upstream https://github.com/KuekHaoYang/KVideo.git
      - : 获取上游更改
运行: git fetch upstream
        
      - 名称: Merge upstream changes
运行: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories
          
      - name: Push changes to origin
        run: git push origin main
